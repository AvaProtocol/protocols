name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Run tests
        run: yarn test:run

      - name: Build
        run: yarn build

      - name: Verify tarball contents
        # Pack a dry-run tarball and assert the dist surface is intact.
        # Catches: missing dist files in `files`, broken exports map.
        run: |
          npm pack --dry-run
          test -f dist/index.js
          test -f dist/index.mjs
          test -f dist/index.d.ts
